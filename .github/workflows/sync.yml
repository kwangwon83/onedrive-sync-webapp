name: OneDrive to GitHub Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 👑 1. 파발마에게 창고(Repository)의 '쓰기 권한'을 명시적으로 하사하옵니다.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 👑 2. 낡은 도구를 새것(@v4)으로 교체하옵니다. (Node 경고 파훼)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 👑 3. 파이썬 도구 역시 최신(@v5)으로 교체하옵니다. (Node 경고 파훼)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests msal

      - name: Run Sync Script
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: python sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # 👑 4. 변경된 지식이 있을 때만 전송하도록 영리하게 명하옵니다. (128 에러 파훼)
          if git diff-index --quiet HEAD --; then
            echo "변경된 지식이 없어 전송을 생략하옵니다."
          else
            git commit -m "Auto-sync from OneDrive"
            git push
          fi
